name: Build & Release

on:
  push:
    branches: [master]
    # Skip the rc counter retrigger; rc commits only touch .release/**.
    paths-ignore:
      - '.release/**'
    tags: ["v*.*.*"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ════════════════════════════════════════════════════════════════════
  # rc — bumps .release/rc-counter.json and pushes back to master.
  # Runs ONLY on master pushes (not tag pushes). Builds depend on this.
  # The follow-up push from this job only touches .release/** and is
  # filtered out by the workflow's paths-ignore, preventing recursion.
  # ════════════════════════════════════════════════════════════════════
  rc:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      base: ${{ steps.bump.outputs.base }}
      rc: ${{ steps.bump.outputs.rc }}
      next_version: ${{ steps.bump.outputs.next_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # PAT is required so the pushed commit can retrigger build.yml.
          # The default GITHUB_TOKEN cannot trigger downstream workflows.
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Bump rc counter
        id: bump
        run: |
          output=$(node -e "
            const fs = require('fs');
            const path = '.release/rc-counter.json';
            const counter = JSON.parse(fs.readFileSync(path, 'utf8'));
            const nextRc = (counter.rc || 0) + 1;
            counter.rc = nextRc;
            fs.writeFileSync(path, JSON.stringify(counter, null, 2) + '\n');
            const version = counter.base + '-rc.' + nextRc;
            console.log('base=' + counter.base);
            console.log('rc=' + nextRc);
            console.log('next_version=' + version);
          ")
          echo "$output" >> "$GITHUB_OUTPUT"
          next_version=$(awk -F= '/^next_version=/{print $2}' <<< "$output")
          echo "::notice::Next nightly: $next_version"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit counter bump
        run: |
          git add .release/rc-counter.json
          git commit -m "chore(release): bump rc to ${{ steps.bump.outputs.next_version }}"

      - name: Push counter bump
        run: git push origin master

  # ════════════════════════════════════════════════════════════════════
  # Build — single matrix for both triggers.
  #   master push  → embeds <base>-rc.N via -c override.
  #   tag push     → uses the manifest version (clean stable).
  # Artifact name differs so nightly & stable don't collide on retries.
  # ════════════════════════════════════════════════════════════════════
  build:
    needs: rc
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── Linux system dependencies ──────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev \
            pkg-config \
            rpm

      # ── Node.js ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust ───────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust_target }}

      # ── Version override (master pushes only) ──────────────────────
      # Tauri is built with a runtime config override (-c) that injects
      # the rc version into bundle metadata, without mutating source.
      # On tag pushes this step is skipped — bundles use manifest version.
      - name: Write runtime version override
        if: github.ref == 'refs/heads/master'
        shell: bash
        run: |
          printf '{\n  "version": "%s"\n}\n' "${{ needs.rc.outputs.next_version }}" \
            > .release/tauri-version-override.json
          cat .release/tauri-version-override.json

      - name: Build Tauri app (nightly rc)
        if: github.ref == 'refs/heads/master'
        run: |
          npx tauri build --target ${{ matrix.rust_target }} \
            -c .release/tauri-version-override.json

      - name: Build Tauri app (stable)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx tauri build --target ${{ matrix.rust_target }}

      # ── Upload artifacts ───────────────────────────────────────────
      # Artifact prefix matches trigger so nightly/stable never collide.
      - name: Upload artifacts (Linux, nightly)
        if: matrix.platform == 'ubuntu-22.04' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 5

      - name: Upload artifacts (Linux, stable)
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: stable-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifacts (macOS, nightly)
        if: startsWith(matrix.platform, 'macos') && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 5

      - name: Upload artifacts (macOS, stable)
        if: startsWith(matrix.platform, 'macos') && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: stable-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifacts (Windows, nightly)
        if: matrix.platform == 'windows-latest' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 5

      - name: Upload artifacts (Windows, stable)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: stable-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════
  # nightly-release — fires on master pushes after build + rc.
  # Tag = <base>-rc.N (does NOT match v*.*.*, so it never retriggers).
  # ════════════════════════════════════════════════════════════════════
  nightly-release:
    needs: [build, rc]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download nightly artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: binaries-*

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
               -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) \
            -exec cp {} release-files/ \;
          echo "── Release files ──"
          ls -lh release-files/

      # ── Build changelog from commits since the previous rc tag ──────
      - name: Build changelog
        id: changelog
        run: |
          VERSION="${{ needs.rc.outputs.next_version }}"
          BASE="${{ needs.rc.outputs.base }}"
          PREV=$(git tag --list "${BASE}-rc.*" --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            PREV=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "previous=$PREV"
          {
            echo "## Commits since \`$PREV\`"
            echo ""
            git log "${PREV}..HEAD" --no-merges --pretty=format:'- `%h` %s'
          } > release-notes.md
          cat release-notes.md

      - name: Publish nightly rc release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.rc.outputs.next_version }}
          name: "Nightly ${{ needs.rc.outputs.next_version }}"
          body: |
            > ⚠️ **Automated pre-release** — not recommended for production use.

            **Version:** `${{ needs.rc.outputs.next_version }}`
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Date:** ${{ github.event.head_commit.timestamp }}

            Each push to `master` produces a new `-rc` release.
            Stable releases are cut with the **Promote Release** workflow.

            ---

            **macOS:** if you see *"demeteo.app is damaged and can't be opened"*, the app
            just isn't notarized by Apple. It's not actually damaged. After dragging it to
            Applications, clear the quarantine flag once:

            ```bash
            xattr -cr /Applications/demeteo.app
            ```

            Then open it normally. (Right-click → Open does **not** work for this case.)

            ---

            ${{ steps.changelog.outputs.content }}
          prerelease: true
          make_latest: false
          files: release-files/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════
  # stable-release — fires on tag pushes (vX.Y.Z from promote workflow).
  # ════════════════════════════════════════════════════════════════════
  stable-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download stable artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: stable-*

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
               -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) \
            -exec cp {} release-files/ \;
          echo "── Release files ──"
          ls -lh release-files/

      # ── Generate Arch Linux PKGBUILD ───────────────────────────────
      - name: Generate PKGBUILD
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE_FILE=$(ls release-files/*.AppImage | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE_FILE")
          APPIMAGE_SHA256=$(sha256sum "$APPIMAGE_FILE" | cut -d' ' -f1)

          cat > release-files/PKGBUILD << 'PKGBUILD_EOF'
          # Maintainer: Steven Yepes <stevenyepes@users.noreply.github.com>
          pkgname=demeteo-bin
          pkgver=PLACEHOLDER_VERSION
          pkgrel=1
          pkgdesc="Fleet-style multi-agent orchestrator for software development"
          arch=('x86_64')
          url="https://github.com/stevenyepes/demeteo"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'openssl' 'dbus' 'hicolor-icon-theme')
          provides=('demeteo')
          conflicts=('demeteo')
          options=('!strip')
          source=("https://github.com/stevenyepes/demeteo/releases/download/v${pkgver}/PLACEHOLDER_APPIMAGE")
          sha256sums=('PLACEHOLDER_SHA256')

          package() {
              install -Dm755 "${srcdir}/PLACEHOLDER_APPIMAGE" "${pkgdir}/opt/demeteo/demeteo.AppImage"

              # Create launcher script
              install -dm755 "${pkgdir}/usr/bin"
              cat > "${pkgdir}/usr/bin/demeteo" << 'EOF'
          #!/bin/sh
          exec /opt/demeteo/demeteo.AppImage "$@"
          EOF
              chmod +x "${pkgdir}/usr/bin/demeteo"

              # Desktop entry
              install -Dm644 /dev/stdin "${pkgdir}/usr/share/applications/demeteo.desktop" << 'EOF'
          [Desktop Entry]
          Name=Demeteo
          Comment=Fleet-style multi-agent orchestrator
          Exec=demeteo
          Icon=demeteo
          Type=Application
          Categories=Development;
          EOF
          }
          PKGBUILD_EOF

          sed -i "s/PLACEHOLDER_VERSION/$VERSION/g" release-files/PKGBUILD
          sed -i "s/PLACEHOLDER_APPIMAGE/$APPIMAGE_NAME/g" release-files/PKGBUILD
          sed -i "s/PLACEHOLDER_SHA256/$APPIMAGE_SHA256/g" release-files/PKGBUILD
          sed -i 's/^          //' release-files/PKGBUILD

          echo "── PKGBUILD ──"
          cat release-files/PKGBUILD

      - name: Publish stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Demeteo ${{ github.ref_name }}"
          body: |
            **macOS:** if you see *"demeteo.app is damaged and can't be opened"*, the app
            just isn't notarized by Apple. It's not actually damaged. After dragging it to
            Applications, clear the quarantine flag once:

            ```bash
            xattr -cr /Applications/demeteo.app
            ```

            Then open it normally. (Right-click → Open does **not** work for this case.)
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
