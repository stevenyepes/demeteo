name: Promote Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          # Use a PAT so the pushed tag triggers the build workflow.
          # The default GITHUB_TOKEN does NOT trigger downstream workflows.
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ── Compute next version ───────────────────────────────────────
      - name: Compute version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          NEXT=$(node -e "
            const [major, minor, patch] = '${CURRENT}'.split('.').map(Number);
            const bump = '${{ inputs.bump_type }}';
            if (bump === 'major') console.log(\`\${major + 1}.0.0\`);
            else if (bump === 'minor') console.log(\`\${major}.\${minor + 1}.0\`);
            else console.log(\`\${major}.\${minor}.\${patch + 1}\`);
          ")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping $CURRENT → $NEXT (${{ inputs.bump_type }})"

      # ── Update version in all manifest files ───────────────────────
      - name: Update package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.next }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Update package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Update tauri.conf.json
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '${{ steps.version.outputs.next }}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Update Cargo.toml
        run: |
          # Update only the first occurrence of version (the [package] section)
          sed -i "0,/^version = \"${{ steps.version.outputs.current }}\"/s//version = \"${{ steps.version.outputs.next }}\"/" \
            src-tauri/Cargo.toml

      - name: Update Cargo.lock
        run: |
          # Update the version for the demeteo package in the lockfile.
          # The format is:
          #   [[package]]
          #   name = "demeteo"
          #   version = "X.Y.Z"
          sed -i "/^name = \"demeteo\"/{n;s/version = \"${{ steps.version.outputs.current }}\"/version = \"${{ steps.version.outputs.next }}\"/}" \
            src-tauri/Cargo.lock

      # ── Verify changes ─────────────────────────────────────────────
      - name: Verify version updates
        run: |
          echo "── package.json ──"
          grep '"version"' package.json

          echo "── tauri.conf.json ──"
          grep '"version"' src-tauri/tauri.conf.json

          echo "── Cargo.toml ──"
          head -5 src-tauri/Cargo.toml | grep version

          echo "── Cargo.lock (demeteo entry) ──"
          grep -A1 'name = "demeteo"' src-tauri/Cargo.lock | head -4

      # ── Commit, tag, push ──────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add \
            package.json \
            package-lock.json \
            src-tauri/Cargo.toml \
            src-tauri/Cargo.lock \
            src-tauri/tauri.conf.json
          git commit -m "chore(release): bump to v${{ steps.version.outputs.next }}"

      - name: Create annotated tag
        run: |
          git tag \
            -a "v${{ steps.version.outputs.next }}" \
            -m "Release v${{ steps.version.outputs.next }}"

      - name: Push commit and tag
        run: |
          git push origin master
          git push origin "v${{ steps.version.outputs.next }}"
          echo "::notice::✅ Pushed v${{ steps.version.outputs.next }} — build workflow will start automatically."
